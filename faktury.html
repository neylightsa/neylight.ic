<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>NeyLight systém</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#171717;
  color:#e3e6e7;
}

.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

input{
  padding:8px;
  margin:4px;
  background:#222;
  border:1px solid #444;
  color:white;
  width:220px;
}

button{
  padding:8px 12px;
  background:#2596be;
  border:none;
  color:white;
  margin:3px;
}

#app{ display:none; padding:15px; }

.card{
  border:1px solid #333;
  margin:8px 0;
  padding:8px;
  background:#1f1f1f;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
  <h2>NeyLight Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="loginUser()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app">

  <h1>Faktury</h1>

  <button onclick="logout()">Odhlásit</button>
  <button onclick="load()">Načíst první</button>
  <button onclick="loadMore()">Načíst další</button>

  <div id="list"></div>

  <hr>

  <h3>Přidat fakturu</h3>

  <input id="customer" placeholder="Zákazník">
  <input id="spz" placeholder="SPZ">
  <input id="product" placeholder="Produkt">
  <input id="price" placeholder="Cena">

  <select id="company">
    <option value="NeyLight">NeyLight</option>
    <option value="NeyCars">NeyCars</option>
  </select>

  <button onclick="add()">Uložit</button>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1ZGJf6oz0D3BAYeCEmg1ZfCzRmkvQC-4",
  authDomain: "neylight-system.firebaseapp.com",
  projectId: "neylight-system"
};

try{ firebase.initializeApp(firebaseConfig); }catch(e){}

const auth = firebase.auth();
const db = firebase.firestore();

let lastDoc = null;

// LOGIN
function loginUser(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(() => {
    loginBox.style.display = "none";
    app.style.display = "block";
  })
  .catch(() => {
    alert("Login chyba");
  });
}

// LOGOUT
function logout(){
  auth.signOut();
  app.style.display = "none";
  loginBox.style.display = "flex";
}

// LOAD první dávka
function load(){

  list.innerHTML = "Načítám...";
  lastDoc = null;

  db.collection("faktury")
  .limit(5)
  .get()
  .then(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
      lastDoc = doc;

      const d = doc.data();

      html += `
        <div class="card">
          <b>${d.company || ""}</b><br>
          ${d.customer || ""}<br>
          ${d.spz || ""}<br>
          ${d.price || ""}
        </div>
      `;
    });

    list.innerHTML = html || "Nic";

  })
  .catch(() => {
    list.innerHTML = "Chyba načítání";
  });

}

// LOAD další
function loadMore(){

  if(!lastDoc){
    alert("Nejdřív načti první data");
    return;
  }

  db.collection("faktury")
  .startAfter(lastDoc)
  .limit(5)
  .get()
  .then(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
      lastDoc = doc;

      const d = doc.data();

      html += `
        <div class="card">
          <b>${d.company || ""}</b><br>
          ${d.customer || ""}<br>
          ${d.spz || ""}<br>
          ${d.price || ""}
        </div>
      `;
    });

    list.innerHTML += html;

  });

}

// ADD
function add(){

  db.collection("faktury").add({
    customer: customer.value,
    spz: spz.value,
    product: product.value,
    price: price.value,
    company: company.value,
    date: new Date().toLocaleDateString()
  });

  alert("Uloženo");
}
</script>

</body>
</html>
