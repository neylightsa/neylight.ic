<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>NeyLight systém</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#171717;
  color:#e3e6e7;
}

.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

input, select{
  padding:10px;
  margin:5px;
  background:#222;
  border:1px solid #444;
  color:white;
  width:250px;
}

button{
  padding:10px 15px;
  background:#2596be;
  border:none;
  color:white;
}

#app{ display:none; padding:20px; }

.card{
  border:1px solid #333;
  margin:10px 0;
  padding:10px;
  background:#1f1f1f;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>NeyLight Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Heslo">
  <button onclick="login()">Přihlásit</button>
</div>

<!-- APP -->
<div id="app">

  <h1>Faktury</h1>
  <button onclick="logout()">Odhlásit</button>

  <hr>

  <button onclick="load()">Načíst faktury</button>

  <div id="list"></div>

  <hr>

  <h2>Přidat fakturu</h2>

  <input id="customer" placeholder="Zákazník">
  <input id="phone" placeholder="Telefon">
  <input id="spz" placeholder="SPZ">
  <input id="vin" placeholder="VIN">
  <input id="product" placeholder="Produkt">
  <input id="price" placeholder="Cena">

  <select id="company">
    <option value="NeyLight">NeyLight</option>
    <option value="NeyCars">NeyCars</option>
  </select>

  <button onclick="add()">Uložit</button>

</div>

<!-- FIREBASE v8 (MTA SAFE) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1ZGJf6oz0D3BAYeCEmg1ZfCzRmkvQC-4",
  authDomain: "neylight-system.firebaseapp.com",
  projectId: "neylight-system",
  storageBucket: "neylight-system.firebasestorage.app",
  messagingSenderId: "325492680239",
  appId: "1:325492680239:web:a80e82f4a2dfa59a9408da"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(() => alert("Chyba loginu"));
}

// LOGOUT
function logout(){
  auth.signOut();
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {

  if(user){
    login.style.display = "none";
    app.style.display = "block";
    load();
  } else {
    login.style.display = "flex";
    app.style.display = "none";
  }

});

// LOAD
function load(){

  list.innerHTML = "";

  db.collection("faktury").get().then(snapshot => {

    snapshot.forEach(doc => {
      const d = doc.data();

      list.innerHTML += `
        <div class="card">
          <b>${d.company}</b><br>
          ${d.customer}<br>
          SPZ: ${d.spz}<br>
          VIN: ${d.vin}<br>
          Produkt: ${d.product}<br>
          Cena: ${d.price}<br>
          Datum: ${d.date}
        </div>
      `;
    });

  });

}

// ADD
function add(){

  db.collection("faktury").add({
    customer: customer.value,
    phone: phone.value,
    spz: spz.value,
    vin: vin.value,
    product: product.value,
    price: price.value,
    company: company.value,
    date: new Date().toLocaleDateString()
  });

  alert("Uloženo");
  load();
}
</script>

</body>
</html>
